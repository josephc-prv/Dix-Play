<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeview Global | LED Configurator Pro</title>
    <style>
        :root {
            --pv-red: #e31e24;
            --pv-anthracite: #323232;
            --pv-black: #1a1a1a;
            --pv-dark: #0f0f0f;
            --pv-white: #ffffff;
            --pv-grey-text: #a0a0a0;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--pv-black); 
            color: var(--pv-white); 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 1150px;
            border: 1px solid var(--pv-anthracite);
            background: var(--pv-anthracite);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            margin: auto;
        }

        .header {
            padding: 20px;
            border-bottom: 4px solid var(--pv-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--pv-white);
            text-align: center;
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                padding: 25px 40px;
                text-align: left;
            }
        }

        .header h1 {
            margin: 0;
            color: var(--pv-anthracite);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .header h1 span { color: var(--pv-red); }
        
        .tagline { 
            color: var(--pv-anthracite); 
            font-size: 0.65rem; 
            letter-spacing: 1.5px; 
            font-weight: bold;
            margin-top: 5px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1px;
            background: #444;
        }

        @media (min-width: 900px) {
            .content-grid { grid-template-columns: 1fr 1.2fr; }
        }

        .panel { padding: 30px; background: var(--pv-anthracite); }

        /* Contenitore principale SX per uniformare tutto */
        .section-wrapper {
            width: 100%;
            max-width: 450px; /* Leggermente più largo per ospitare i dropdown */
            margin: 0 auto;
        }

        .section-title {
            color: var(--pv-red);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 20px;
            display: block;
            border-left: 4px solid var(--pv-red);
            padding-left: 12px;
            width: 100%;
        }

        /* Griglia a due colonne per accoppiare Input e Preset */
        .input-pair-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: end;
        }

        .input-box { width: 100%; }

        label {
            display: block;
            font-size: 0.65rem;
            color: var(--pv-grey-text);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            white-space: nowrap;
        }

        .sub-label {
            font-size: 0.6rem;
            color: var(--pv-red);
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            background: var(--pv-dark);
            border: 1px solid #555;
            color: var(--pv-white);
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 4px;
            height: 48px; /* Altezza fissa per tutti */
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--pv-red);
            outline: none;
        }

        .btn-reset {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--pv-red);
            color: var(--pv-white);
            text-transform: uppercase;
            font-weight: 800;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-reset:hover { background: var(--pv-red); }

        /* Pannello DX */
        .result-card {
            background: var(--pv-dark);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 12px;
            border: 1px solid #333;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .val-label { font-size: 0.72rem; color: #999; text-transform: uppercase; }
        .val-output { font-size: 1rem; font-weight: 700; }
        .val-red { color: var(--pv-red); }

        .footer {
            padding: 15px;
            text-align: center;
            font-size: 0.65rem;
            color: #777;
            background: var(--pv-dark);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>PRIME<span>VIEW</span></h1>
        <div class="tagline">THE POWER OF PRIME</div>
    </div>

    <div class="content-grid">
        <div class="panel">
            <div class="section-wrapper">
                <span class="section-title">Physical Specs</span>
                
                <div class="input-pair-grid">
                    <div class="input-box">
                        <label>Target Diagonal (Inches)</label>
                        <input type="number" id="diag" placeholder="---" step="0.1" oninput="manualInput('diag')">
                    </div>
                    <div class="input-box">
                        <div class="sub-label">Preset Size</div>
                        <select id="standardDiag" onchange="setStandardDiag()">
                            <option value="" selected disabled>Choose...</option>
                            <option value="custom">Custom</option>
                            <option value="55">55"</option>
                            <option value="75">75"</option>
                            <option value="98">98"</option>
                            <option value="110">110"</option>
                            <option value="138">138"</option>
                            <option value="165">165"</option>
                            <option value="220">220"</option>
                        </select>
                    </div>
                </div>

                <div class="input-pair-grid">
                    <div class="input-box">
                        <label>Width (mm)</label>
                        <input type="number" id="manualW" placeholder="---" oninput="manualInput('mm')">
                    </div>
                    <div class="input-box">
                        <label>Height (mm)</label>
                        <input type="number" id="manualH" placeholder="---" oninput="manualInput('mm')">
                    </div>
                </div>

                <div class="input-box" style="margin-bottom: 20px;">
                    <label>Aspect Ratio</label>
                    <select id="ratio" onchange="manualInput('diag')">
                        <option value="1.77777777778">16:9 (Standard)</option>
                        <option value="2.33333333333">21:9 (Ultrawide)</option>
                        <option value="3.55555555556">32:9 (Panoramic)</option>
                        <option value="1.33333333333">4:3</option>
                    </select>
                </div>

                <span class="section-title" style="margin-top: 40px;">Pixel Specs</span>

                <div class="input-box" style="margin-bottom: 20px;">
                    <label>Pixel Pitch (mm)</label>
                    <input type="number" id="pitch" value="1.58" step="0.01" oninput="manualInput('pitch')">
                </div>

                <div class="input-pair-grid">
                    <div class="input-box">
                        <label>Vertical Res (Pixels)</label>
                        <input type="number" id="resH" placeholder="---" oninput="manualInput('res')">
                    </div>
                    <div class="input-box">
                        <div class="sub-label">Preset Res</div>
                        <select id="standardRes" onchange="setStandardRes()">
                            <option value="" selected disabled>Choose...</option>
                            <option value="custom">Custom</option>
                            <option value="720">HD Ready</option>
                            <option value="1080">Full HD</option>
                            <option value="2160">4K (UHD)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-reset" onclick="resetAll()">Reset All Fields</button>
            </div>
        </div>

        <div class="panel" style="background: #282828;">
            <span class="section-title">Results</span>
            <div class="result-card">
                <div class="result-row">
                    <span class="val-label">Active Area</span>
                    <span class="val-output" id="activeArea">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Footprint</span>
                    <span class="val-output" id="footprint">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Exact Layout</span>
                    <span class="val-output val-red" id="cabLayout">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Cabinet Count</span>
                    <span class="val-output" id="totalCabs">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="result-row">
                    <span class="val-label">Total Pixels</span>
                    <span class="val-output" id="totalPx">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Ports (650k)</span>
                    <span class="val-output" id="ports650">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Ports (5G)</span>
                    <span class="val-output" id="ports5G">-</span>
                </div>
            </div>

            <div class="result-card" style="border-left: 4px solid var(--pv-red);">
                <div class="result-row">
                    <span class="val-label">Viewing Distance</span>
                    <span class="val-output" id="viewRange">-</span>
                </div>
                <div class="result-row">
                    <span class="val-label">Novastar Unit</span>
                    <span class="val-output val-red" id="novaProcessor">-</span>
                </div>
            </div>

            <div class="result-card">
                <div class="result-row">
                    <span class="val-label">Brompton 1G</span>
                    <span class="val-output" id="bromptonPorts">-</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">PRIMEVIEW GLOBAL - LED CONFIGURATOR PRO</div>
</div>

<script>
const CAB_W = 600;
const CAB_H = 337.5;
const CAP_650 = 650000;
const CAP_590 = 590000;
const CAP_5G = 5000000;

function setStandardDiag() {
    const val = document.getElementById('standardDiag').value;
    if (val && val !== "custom") {
        document.getElementById('diag').value = val;
        runCalc('diag');
    }
}

function setStandardRes() {
    const val = document.getElementById('standardRes').value;
    if (val && val !== "custom") {
        document.getElementById('resH').value = val;
        runCalc('res');
    }
}

function manualInput(source) {
    if (source === 'diag' || source === 'mm') document.getElementById('standardDiag').value = "custom";
    if (source === 'res') document.getElementById('standardRes').value = "custom";
    runCalc(source);
}

function resetAll() {
    document.getElementById('diag').value = "";
    document.getElementById('standardDiag').selectedIndex = 0;
    document.getElementById('manualW').value = "";
    document.getElementById('manualH').value = "";
    document.getElementById('resH').value = "";
    document.getElementById('standardRes').selectedIndex = 0;
    const ids = ['activeArea', 'footprint', 'cabLayout', 'totalCabs', 'totalPx', 'ports650', 'ports5G', 'viewRange', 'novaProcessor', 'bromptonPorts'];
    ids.forEach(id => document.getElementById(id).innerText = "-");
}

function runCalc(source) {
    let diag = parseFloat(document.getElementById('diag').value);
    let ratio = parseFloat(document.getElementById('ratio').value);
    let pitch = parseFloat(document.getElementById('pitch').value) || 1.5;
    let resH = parseFloat(document.getElementById('resH').value);
    let manualW = parseFloat(document.getElementById('manualW').value);

    if (isNaN(diag) && isNaN(manualW)) return;

    let wMm, hMm;

    if (source === 'mm' && !isNaN(manualW)) {
        wMm = manualW; hMm = manualW / ratio;
        document.getElementById('manualH').value = Math.round(hMm);
        diag = (Math.sqrt(Math.pow(wMm, 2) + Math.pow(hMm, 2))) / 25.4;
        document.getElementById('diag').value = diag.toFixed(1);
    } else {
        hMm = (diag / Math.sqrt(Math.pow(ratio, 2) + 1)) * 25.4;
        wMm = hMm * ratio;
        document.getElementById('manualW').value = Math.round(wMm);
        document.getElementById('manualH').value = Math.round(hMm);
    }

    if (source === 'res') {
        pitch = hMm / resH;
        document.getElementById('pitch').value = pitch.toFixed(3);
    } else {
        resH = Math.round(hMm / pitch);
        document.getElementById('resH').value = resH;
    }

    const resW = Math.round(wMm / pitch);
    const totalPx = resW * resH;
    const cabsW = wMm / CAB_W;
    const cabsH = hMm / CAB_H;

    const reqPorts590 = Math.ceil(totalPx / CAP_590);
    let suggested = reqPorts590 <= 6 ? "VX600 Pro" : reqPorts590 <= 10 ? "VX1000 Pro" : reqPorts590 <= 20 ? "VX2000 Pro" : "H-Series";

    document.getElementById('activeArea').innerText = `${Math.round(wMm)}x${Math.round(hMm)}mm`;
    document.getElementById('footprint').innerText = `${(cabsW * CAB_W).toFixed(0)}x${(cabsH * CAB_H).toFixed(0)}mm`;
    document.getElementById('cabLayout').innerText = `${cabsW.toFixed(2)}x${cabsH.toFixed(2)}`;
    document.getElementById('totalCabs').innerText = (cabsW * cabsH).toFixed(2);
    document.getElementById('totalPx').innerText = totalPx.toLocaleString();
    document.getElementById('ports650').innerText = Math.ceil(totalPx / CAP_650);
    document.getElementById('ports5G').innerText = Math.ceil(totalPx / CAP_5G);
    document.getElementById('viewRange').innerText = `${(pitch * 1).toFixed(1)}-${(pitch * 3).toFixed(1)}m`;
    document.getElementById('novaProcessor').innerText = suggested;
    document.getElementById('bromptonPorts').innerText = Math.ceil(totalPx / 524000) + " Ports";
}
</script>

</body>
</html>
